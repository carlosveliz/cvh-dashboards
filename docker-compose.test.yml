# Ephemeral test stack: disposable Postgres + pytest runner.
# Source is mounted so code changes don't require an image rebuild
# (rebuild only when requirements.txt changes).
#   docker compose -p cvh-test -f docker-compose.test.yml run --rm --build tests
services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_USER: cvh
      POSTGRES_PASSWORD: cvh_password
      POSTGRES_DB: cvh_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvh -d cvh_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  tests:
    build: ./backend
    depends_on:
      test-db:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://cvh:cvh_password@test-db:5432/cvh_test
      DATABASE_URL: postgresql+asyncpg://cvh:cvh_password@test-db:5432/cvh_test
      SECRET_KEY: "test-secret-test-secret-test-secret-xx"
      ADMIN_EMAIL: admin@cvhtest.com
      ADMIN_PASSWORD: Admin12345!
    volumes:
      - ./backend:/app
    # Bypass the production entrypoint (alembic upgrade + uvicorn).
    entrypoint: ["python", "-m", "pytest"]
    command: ["-q"]
